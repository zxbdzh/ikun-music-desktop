name: Build

on:
  workflow_dispatch:
env:
  IS_CI: 'true'

jobs:
  Windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get npm cache directory
        shell: pwsh
        run: echo "NPM_CACHE=$(npm config get cache)" >> $env:GITHUB_ENV

      - name: Show Env
        run: echo "${{ env.NPM_CACHE }}"

      - name: Setup Node Env
        env:
          NPM_CACHE: ${{ env.NPM_CACHE }}
        uses: ./.github/actions/setup

      - name: Build src code
        run: |
          git status --porcelain
          pnpm run build

      - name: Release package
        run: |
          pnpm run publish:win:7z:x64
          pnpm run publish:win:7z:arm64
          pnpm run publish:win:setup:arm64
          pnpm run publish:win:setup:x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate file MD5
        run: |
          cd build
          Get-FileHash *.exe,*.7z -Algorithm MD5 | Format-List
      - name: Send WeChat Notification
        if: success()
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $repo = "${{ github.repository }}"
          $runId = "${{ github.run_id }}"
          $draftUrl = "https://github.com/$repo/releases/tag/$version"
          $buildUrl = "${{ github.server_url }}/$repo/actions/runs/$runId"

          # 拼接 markdown 内容
          $content = @"
          ## 🎉 草稿打包成功
          **版本号：** $version
          **状态：** ✅ Release 草稿构建成功
          **草稿链接：** [ 查看/发布草稿 ]($draftUrl)
          **构建详情：** [查看构建日志]($buildUrl)
          "@

          # 执行 curl
          curl "https://www.pushplus.plus/send" \
          -H "Accept: */*" \
          -H "Content-Type: application/json;charset=UTF-8" \
          -H "X-Requested-With: XMLHttpRequest" \
          --data-raw "{`"token`":`"${{ secrets.PUSHPLUS_TOKEN }}`",`"title`":`"🎉 ikunMusic - Release 草稿发布成功`",`"content`":`"$($content -replace "`r`n", '\r\n')`",`"template`":`"markdown`",`"channel`":`"wechat`"}"
