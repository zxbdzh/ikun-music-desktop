name: Build

on:
  workflow_dispatch:

# 必须声明权限，否则无法发布 Release
permissions:
  contents: write

env:
  IS_CI: 'true'

jobs:
  Windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4
#
