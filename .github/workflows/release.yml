#        uses: ./.github/actions/setup
#
#      - name: Build src code
#        run: |
#          git status --porcelain
#          pnpm run build
#
#      - name: Release package
#        run: |
#          pnpm run publish:win:7z:x64
#          pnpm run publish:win:7z:arm64
#          pnpm run publish:win:setup:arm64
#          pnpm run publish:win:setup:x64
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#
#      - name: Generate file MD5
#        run: |
#          cd build
#          Get-FileHash *.exe,*.7z -Algorithm MD5 | Format-List
      - name: Send WeChat Notification
        if: always() # 无论成功失败都运行，或者用 success()
        shell: pwsh
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          $packageJson = Get-Content package.json | ConvertFrom-Json
          $version = $packageJson.version
          $repo = "${{ github.repository }}"
          $runId = "${{ github.run_id }}"
          $draftUrl = "https://github.com/$repo/releases"
          $buildUrl = "${{ github.server_url }}/$repo/actions/runs/$runId"
          $status = if ("${{ job.status }}" -eq "success") { "🎉 打包成功" } else { "❌ 打包失败" }

          # 使用普通字符串拼接，避免 Here-String 的顶格缩进问题
          $richContent = "## $status`n`n"
          $richContent += "**📦 版本号：** ``$version`` `n"
          # 强制转换为 中国标准时间 (UTC+8 上海)
          $shanghaiTime = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId(
          [DateTime]::UtcNow,
          'China Standard Time'
          )
          # 拼接到你的富文本
          $richContent += "**⏰ 时间：** $($shanghaiTime.ToString('yyyy-MM-dd HH:mm:ss')) `n`n"
          $richContent += "---`n`n"
          $richContent += "### 🔗 快速链接`n"
          $richContent += "- **[查看/发布草稿]($draftUrl)**`n"
          $richContent += "- **[查看构建日志]($buildUrl)**"

          $body = @{
            token    = $env:PUSHPLUS_TOKEN
            title    = "ikunMusic 构建通知 - $version"
            content  = $richContent
            template = "markdown"
          } | ConvertTo-Json -Compress

          Invoke-RestMethod -Uri "https://www.pushplus.plus/send" -Method Post -ContentType "application/json" -Body $body

