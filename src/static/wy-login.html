<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网易云音乐登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #ec4141;
    }
    p {
      font-size: 14px;
      color: #999;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .status {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .status.loading {
      background: rgba(236, 65, 65, 0.1);
      border: 1px solid #ec4141;
    }
    .status.success {
      background: rgba(46, 186, 131, 0.1);
      border: 1px solid #2eba83;
      color: #2eba83;
    }
    .status.error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(236, 65, 65, 0.2);
      border-top-color: #ec4141;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #ec4141;
      color: #fff;
    }
    .btn-primary:hover {
      background: #d93a3a;
    }
    .btn-secondary {
      background: #333;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 网易云音乐登录</h1>

    <div id="status" class="status loading">
      <div class="spinner"></div>
      <p id="statusText">正在等待登录...</p>
    </div>

    <p>
      请在打开的网易云音乐登录页面中完成登录。<br>
      登录成功后，Cookie 将自动保存。
    </p>

    <div id="actions" style="display: none;">
      <button class="btn btn-primary" onclick="retry()">重试</button>
      <button class="btn btn-secondary" onclick="closeWindow()">关闭</button>
    </div>
  </div>

  <script>
    const LOGIN_URL = 'https://music.163.com/m/login';
    const SUCCESS_URL_FLAG = 'music.163.com';

    let cookieCaptured = false;

    function updateStatus(type, text) {
      const statusEl = document.getElementById('status');
      const actionsEl = document.getElementById('actions');

      statusEl.className = 'status ' + type;
      statusEl.innerHTML = type === 'loading'
        ? '<div class="spinner"></div><p id="statusText">' + text + '</p>'
        : '<p id="statusText">' + text + '</p>';

      if (type !== 'loading') {
        actionsEl.style.display = 'block';
      }
    }

    function retry() {
      window.location.href = LOGIN_URL;
    }

    function closeWindow() {
      window.close();
    }

    // 监听来自网易云页面的消息
    window.addEventListener('message', function(event) {
      // 验证来源
      if (!event.origin.includes('music.163.com') && !event.origin.includes('localhost')) {
        return;
      }

      const data = event.data;
      if (typeof data !== 'string') return;

      // 检查是否包含登录凭证
      if (data.includes('S_INFO=') && !cookieCaptured) {
        cookieCaptured = true;
        updateStatus('success', '登录成功！正在保存 Cookie...');

        // 通过 URL 参数传递 cookie 给主窗口
        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('redirect') || 'https://music.163.com';

        // 通知父窗口
        if (window.opener) {
          window.opener.postMessage(data, '*');
        }

        // 延迟关闭
        setTimeout(function() {
          window.close();
        }, 1500);
      }
    });

    // 拦截 document.cookie 访问
    Object.defineProperty(document, 'cookie', {
      get: function() {
        const cookie = this._cookie || '';
        return cookie;
      },
      set: function(value) {
        this._cookie = value;
        // 当设置包含 S_INFO 的 cookie 时，自动发送消息
        if (value.includes('S_INFO=') && !cookieCaptured) {
          cookieCaptured = true;
          updateStatus('success', '登录成功！正在保存 Cookie...');

          if (window.opener) {
            window.opener.postMessage(document.cookie, '*');
          }

          setTimeout(function() {
            window.close();
          }, 1500);
        }
      }
    });

    // 定期检查 URL 变化（作为备用方案）
    let lastUrl = window.location.href;
    setInterval(function() {
      if (window.location.href !== lastUrl) {
        lastUrl = window.location.href;

        // 如果 URL 不再是登录页面，认为登录成功
        if (!lastUrl.includes('/login') && lastUrl.includes(SUCCESS_URL_FLAG)) {
          // 尝试从 URL 中提取信息
          // 由于安全限制，直接跳转到主应用
          if (!cookieCaptured && window.opener) {
            updateStatus('loading', '登录页面跳转，尝试获取 Cookie...');

            // 提示用户手动复制 Cookie
            setTimeout(function() {
              if (!cookieCaptured) {
                updateStatus('error', 'Cookie 获取失败，请刷新后重试');
              }
            }, 3000);
          }
        }
      }
    }, 500);
  </script>
</body>
</html>
